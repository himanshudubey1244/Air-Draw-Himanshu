<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Air Draw"/>
<meta name="theme-color" content="#0a0a0f"/>
<link rel="manifest" href="manifest.json"/>
<title>Air Draw — by Himanshu Dubey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100dvh;width:100vw;user-select:none;-webkit-user-select:none;touch-action:none}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;cursor:none}
#video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);z-index:1;opacity:0.15}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none}

/* ── TOP BAR ── */
#topbar{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;
  background:rgba(10,10,20,0.92);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.1);border-radius:40px;
  padding:8px 14px;pointer-events:all;
  box-shadow:0 4px 24px rgba(0,0,0,0.6);
  max-width:calc(100vw - 160px);overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;
  white-space:nowrap;
}
#topbar::-webkit-scrollbar{display:none}
.logo{font-size:13px;font-weight:700;letter-spacing:0.05em;color:#e0d8ff;white-space:nowrap;flex-shrink:0}
.sep{width:1px;height:18px;background:rgba(255,255,255,0.12);flex-shrink:0}
.color-row{display:flex;gap:5px;align-items:center;flex-shrink:0}
.swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s,border-color 0.15s;flex-shrink:0;touch-action:manipulation}
.swatch:hover,.swatch:active{transform:scale(1.25)}
.swatch.active{border-color:#fff;transform:scale(1.3)}
.sliders{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.slider-row{display:flex;align-items:center;gap:5px}
.slider-row label{font-size:10px;color:rgba(255,255,255,0.4);width:28px;text-align:right;white-space:nowrap}
.slider-row input[type=range]{width:65px;cursor:pointer;pointer-events:all;accent-color:#a88fff;touch-action:manipulation}
.slider-row span{font-size:10px;color:rgba(255,255,255,0.55);min-width:26px}
.btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#fff;border-radius:16px;padding:5px 11px;font-size:11px;cursor:pointer;pointer-events:all;transition:background 0.15s;white-space:nowrap;touch-action:manipulation;flex-shrink:0}
.btn:hover,.btn:active{background:rgba(255,255,255,0.18)}
.btn.danger{border-color:rgba(255,80,80,0.4);color:#ff8080}

/* ── LEFT PANEL ── */
#leftPanel{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:8px;pointer-events:all;z-index:4}
.lpanel-card{background:rgba(10,10,20,0.92);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.lp-title{font-size:8px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em}
.lp-row{display:flex;align-items:center;gap:8px}
.lp-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#fff;border-radius:9px;padding:5px 10px;font-size:11px;cursor:pointer;transition:background 0.15s;white-space:nowrap;display:flex;align-items:center;gap:4px;touch-action:manipulation}
.lp-btn:hover,.lp-btn:active{background:rgba(168,143,255,0.2);border-color:#a88fff}
.lp-btn.active{background:rgba(168,143,255,0.22);border-color:#a88fff;box-shadow:0 0 8px rgba(168,143,255,0.4)}
.lp-btn.save-btn{border-color:rgba(74,216,200,0.4);color:#4ad8c8}
.lp-btn.save-btn:hover,.lp-btn.save-btn:active{background:rgba(74,216,200,0.15)}
.lp-label{font-size:9px;color:rgba(255,255,255,0.4);min-width:20px}
.lp-range{width:60px;accent-color:#a88fff;cursor:pointer;touch-action:manipulation}
.bg-swatches{display:flex;gap:5px;flex-wrap:wrap;max-width:120px}
.bg-swatch{width:20px;height:20px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;touch-action:manipulation}
.bg-swatch:hover,.bg-swatch:active{transform:scale(1.15)}
.bg-swatch.active{border-color:#fff;transform:scale(1.2)}

/* ── GESTURE HUD ── */
#gestureHud{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;background:rgba(10,10,20,0.88);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.07);border-radius:40px;padding:8px 14px;white-space:nowrap}
.gcard{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px}
.gcard .gicon{font-size:18px;line-height:1}
.gcard .glabel{font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em}
.gcard.active .gicon{filter:drop-shadow(0 0 8px rgba(168,143,255,1))}
.gcard.active .glabel{color:#c4b0ff}
.gdiv{width:1px;height:24px;background:rgba(255,255,255,0.08)}

/* ── STATUS ── */
#statusPill{position:absolute;top:10px;right:10px;background:rgba(10,10,20,0.88);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:6px 11px;font-size:10px;display:flex;align-items:center;gap:6px;pointer-events:all}
#statusDot{width:7px;height:7px;border-radius:50%;background:#555;transition:background 0.3s;flex-shrink:0}
#statusDot.ready{background:#4ade80;box-shadow:0 0 6px #4ade80}
#statusDot.tracking{background:#a88fff;box-shadow:0 0 6px #a88fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── WATERMARK ── */
#watermark{position:absolute;bottom:14px;left:14px;font-size:11px;font-weight:500;color:#fff;opacity:0.65;pointer-events:none;text-shadow:0 0 10px rgba(168,143,255,0.5);white-space:nowrap}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;z-index:100;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px}
#overlay h1{font-size:24px;font-weight:700;color:#e0d8ff}
#overlay p{font-size:13px;color:rgba(255,255,255,0.45);max-width:320px;line-height:1.6}
.spinner{width:34px;height:34px;border:3px solid rgba(168,143,255,0.2);border-top-color:#a88fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#startBtn{background:linear-gradient(135deg,#a88fff,#ff6bab);border:none;color:#fff;border-radius:22px;padding:13px 30px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(168,143,255,0.4);display:none;touch-action:manipulation;transition:opacity 0.2s}
#startBtn:active{opacity:0.8}
#errBox{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);border-radius:12px;padding:12px 16px;font-size:12px;color:#ff8080;max-width:320px;line-height:1.6;display:none}
.hidden{display:none!important}

/* ── CURSOR RING ── */
#cursorRing{position:absolute;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);pointer-events:none;z-index:5;transform:translate(-50%,-50%);transition:width 0.1s,height 0.1s,border-color 0.1s,box-shadow 0.1s;display:none}
#cursorRing.drawing{width:12px;height:12px;border-color:#a88fff;border-width:3px;box-shadow:0 0 12px #a88fff}
#cursorRing.erasing{width:44px;height:44px;border-color:#ff5050;border-width:2px;box-shadow:0 0 16px #ff5050}
#cursorRing.moving{width:30px;height:30px;border-color:#4ad8c8;box-shadow:0 0 12px #4ad8c8}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  #topbar{max-width:calc(100vw - 130px);gap:6px;padding:7px 10px}
  .logo{font-size:11px}
  .swatch{width:15px;height:15px}
  .slider-row input[type=range]{width:52px}
  .sliders{gap:4px}
  #leftPanel{gap:6px}
  .lpanel-card{padding:8px 10px;gap:6px}
  .lp-btn{padding:4px 8px;font-size:10px}
  .lp-range{width:50px}
  .bg-swatch{width:17px;height:17px}
  #gestureHud{padding:6px 10px;gap:4px;bottom:10px}
  .gcard{min-width:36px}
  .gcard .gicon{font-size:15px}
  .gcard .glabel{font-size:8px}
  #watermark{font-size:10px;bottom:10px;left:10px}
}
@media(max-width:400px){
  .slider-row input[type=range]{width:42px}
  .logo{display:none}
  .sep:first-of-type{display:none}
  .lp-range{width:42px}
  .gcard .glabel{display:none}
  #gestureHud{gap:3px}
}
@media(orientation:landscape)and(max-height:500px){
  #leftPanel{flex-direction:row;top:auto;bottom:10px;left:50%;transform:translateX(-50%);flex-wrap:wrap;justify-content:center;max-width:calc(100vw - 20px)}
  #gestureHud{bottom:auto;top:10px;right:10px;left:auto;transform:none}
  #watermark{display:none}
  #topbar{top:auto;bottom:70px;left:50%;transform:translateX(-50%)}
  #statusPill{top:10px;left:10px;right:auto}
}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <div id="topbar">
    <span class="logo">✦ Air Draw</span>
    <div class="sep"></div>
    <div class="color-row" id="colorRow"></div>
    <div class="sep"></div>
    <div class="sliders">
      <div class="slider-row"><label>Size</label><input type="range" id="thickRange" min="2" max="50" value="8"/><span id="thickVal">8px</span></div>
      <div class="slider-row"><label>Glow</label><input type="range" id="glowRange" min="0" max="100" value="40" style="accent-color:#ff6bff"/><span id="glowVal">40%</span></div>
    </div>
    <div class="sep"></div>
    <button class="btn" id="undoBtn">↩ Undo</button>
    <button class="btn danger" id="clearBtn">✕ Clear</button>
  </div>

  <div id="leftPanel">
    <div class="lpanel-card">
      <div class="lp-title">📷 Camera</div>
      <div class="lp-row"><button class="lp-btn active" id="camToggleBtn">📷 ON</button></div>
      <div class="lp-row">
        <span class="lp-label">Dim</span>
        <input type="range" class="lp-range" id="camOpacity" min="0" max="40" value="15"/>
        <span class="lp-label">Bright</span>
      </div>
    </div>
    <div class="lpanel-card">
      <div class="lp-title">🎨 BG</div>
      <div class="bg-swatches" id="bgSwatches"></div>
    </div>
    <div class="lpanel-card">
      <div class="lp-title">💾 Save</div>
      <button class="lp-btn save-btn" id="saveBtn">⬇ PNG</button>
    </div>
  </div>

  <div id="gestureHud">
    <div class="gcard" id="g-draw"><span class="gicon">☝️</span><span class="glabel">Draw</span></div>
    <div class="gdiv"></div>
    <div class="gcard" id="g-erase"><span class="gicon">✋</span><span class="glabel">Erase</span></div>
    <div class="gdiv"></div>
    <div class="gcard" id="g-move"><span class="gicon">🤏</span><span class="glabel">Move</span></div>
    <div class="gdiv"></div>
    <div class="gcard" id="g-idle"><span class="gicon">✊</span><span class="glabel">Idle</span></div>
  </div>

  <div id="watermark">✦ Air Draw: by Himanshu Dubey</div>
  <div id="statusPill"><div id="statusDot"></div><span id="statusText">Loading…</span></div>
</div>

<div id="cursorRing"></div>

<div id="overlay">
  <div class="spinner" id="spinner"></div>
  <h1>✦ Air Draw</h1>
  <p id="loadMsg">Loading MediaPipe hand tracking…</p>
  <button id="startBtn" onclick="startCamera()">🎥 Start Camera</button>
  <div id="errBox"></div>
</div>

<script>
var MP_BASE='https://cdn.jsdelivr.net/npm/@mediapipe/';
function loadScript(src){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src=src;s.crossOrigin='anonymous';
    s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}
function showError(msg){
  var b=document.getElementById('errBox');
  b.innerHTML='⚠️ '+msg;b.style.display='block';
  document.getElementById('spinner').style.display='none';
  document.getElementById('startBtn').style.display='inline-block';
  document.getElementById('loadMsg').textContent='Something went wrong.';
}

window.addEventListener('DOMContentLoaded',function(){
  document.getElementById('loadMsg').textContent='Loading hand tracking libraries…';
  Promise.all([
    loadScript(MP_BASE+'camera_utils/camera_utils.js'),
    loadScript(MP_BASE+'drawing_utils/drawing_utils.js'),
    loadScript(MP_BASE+'hands/hands.js')
  ]).then(function(){
    document.getElementById('loadMsg').textContent='Ready! Tap below to start.';
    document.getElementById('spinner').style.display='none';
    document.getElementById('startBtn').style.display='inline-block';
  }).catch(function(err){ showError('Failed to load libraries. Check internet connection.<br>'+err); });
});

function startCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    showError('Camera not available. Use HTTPS (GitHub Pages) or localhost.');return;
  }
  document.getElementById('startBtn').style.display='none';
  document.getElementById('spinner').style.display='block';
  document.getElementById('loadMsg').textContent='Requesting camera…';
  initApp();
}

function initApp(){
  var canvas=document.getElementById('canvas');
  var ctx=canvas.getContext('2d');
  var video=document.getElementById('video');
  var overlay=document.getElementById('overlay');
  var loadMsg=document.getElementById('loadMsg');
  var statusDot=document.getElementById('statusDot');
  var statusText=document.getElementById('statusText');
  var cursorRing=document.getElementById('cursorRing');
  var camToggleBtn=document.getElementById('camToggleBtn');
  var camOpacity=document.getElementById('camOpacity');
  var saveBtn=document.getElementById('saveBtn');
  var bgSwatches=document.getElementById('bgSwatches');

  var strokes=[],currentStroke=null,currentColor='#ffffff',brushSize=8,glowAmount=40;
  var prevGesture='idle',moveAnchor=null,strokesSnapshot=null,camOn=true;
  var currentBg='#0a0a0f';

  var COLORS=[
    '#ffffff','#cccccc','#888888',
    '#bf5fff','#e040fb','#ff4fd8','#ff6bab','#ff6b9d',
    '#ff3c3c','#ff6b35','#ff9500','#ffcc00',
    '#ccff00','#39ff14','#00ff88','#00ffcc',
    '#00e5ff','#00b0ff','#4d8fff','#6b8fff',
    '#ff00ff','#ff007f','#7fff00','#00ffff',
    '#ff4400','#ff0080','#80ff00','#0080ff'
  ];
  var BG_THEMES=[
    {label:'Dark',bg:'#0a0a0f'},{label:'Black',bg:'#000000'},
    {label:'Navy',bg:'#050a1a'},{label:'Forest',bg:'#050f05'},
    {label:'Wine',bg:'#0f050a'},{label:'Violet',bg:'#0a0518'},
  ];

  function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;redrawStrokes();}
  window.addEventListener('resize',resizeCanvas);
  window.addEventListener('orientationchange',function(){setTimeout(resizeCanvas,200);});
  resizeCanvas();

  // Color swatches
  var colorRow=document.getElementById('colorRow');
  COLORS.forEach(function(c){
    var s=document.createElement('div');
    s.className='swatch'+(c===currentColor?' active':'');
    s.style.background=c;s.style.boxShadow='0 0 5px '+c;
    s.addEventListener('click',function(){
      currentColor=c;
      document.querySelectorAll('.swatch').forEach(function(el){el.classList.remove('active');el.style.boxShadow='0 0 5px '+el.style.background;});
      s.classList.add('active');s.style.boxShadow='0 0 14px '+c+',0 0 28px '+c;
      cursorRing.style.borderColor=c;cursorRing.style.boxShadow='0 0 10px '+c;
    });
    colorRow.appendChild(s);
  });

  // BG swatches
  BG_THEMES.forEach(function(theme,idx){
    var sw=document.createElement('div');
    sw.className='bg-swatch'+(idx===0?' active':'');
    sw.style.background=theme.bg;sw.title=theme.label;
    sw.addEventListener('click',function(){
      currentBg=theme.bg;
      document.body.style.background=theme.bg;
      document.getElementById('overlay').style.background=theme.bg;
      document.querySelectorAll('.bg-swatch').forEach(function(el){el.classList.remove('active');});
      sw.classList.add('active');
    });
    bgSwatches.appendChild(sw);
  });

  // Controls
  document.getElementById('thickRange').addEventListener('input',function(){brushSize=parseInt(this.value,10);document.getElementById('thickVal').textContent=brushSize+'px';});
  document.getElementById('glowRange').addEventListener('input',function(){glowAmount=parseInt(this.value,10);document.getElementById('glowVal').textContent=glowAmount+'%';});
  document.getElementById('undoBtn').addEventListener('click',function(){strokes.pop();redrawStrokes();});
  document.getElementById('clearBtn').addEventListener('click',function(){strokes=[];ctx.clearRect(0,0,canvas.width,canvas.height);});
  camToggleBtn.addEventListener('click',function(){
    camOn=!camOn;video.style.display=camOn?'block':'none';
    camToggleBtn.textContent=camOn?'📷 ON':'📷 OFF';
    camToggleBtn.classList.toggle('active',camOn);
  });
  camOpacity.addEventListener('input',function(){video.style.opacity=(parseInt(this.value,10)/100).toFixed(2);});

  // ── SAVE PNG (2 files) ────────────────────────────────
  saveBtn.addEventListener('click',function(){
    var ts=Date.now();
    var w=canvas.width,h=canvas.height;

    // ── File 1: Black BG + drawing (existing behaviour) ──
    var ec1=document.createElement('canvas');ec1.width=w;ec1.height=h;
    var c1=ec1.getContext('2d');
    c1.fillStyle=currentBg;c1.fillRect(0,0,w,h);
    c1.drawImage(canvas,0,0);
    c1.font='14px Segoe UI';c1.fillStyle='rgba(255,255,255,0.55)';
    c1.shadowColor='rgba(168,143,255,0.6)';c1.shadowBlur=10;
    c1.fillText('✦ Air Draw: by Himanshu Dubey',16,h-16);
    var a1=document.createElement('a');a1.download='airdraw-drawing-'+ts+'.png';a1.href=ec1.toDataURL('image/png');a1.click();

    // ── File 2: Camera frame + drawing (transparent camera) ──
    setTimeout(function(){
      var ec2=document.createElement('canvas');ec2.width=w;ec2.height=h;
      var c2=ec2.getContext('2d');
      // Draw mirrored camera frame as background
      c2.save();
      c2.translate(w,0);c2.scale(-1,1); // mirror to match display
      try{ c2.drawImage(video,0,0,w,h); }catch(e){}
      c2.restore();
      // Overlay drawing on top at full opacity
      c2.drawImage(canvas,0,0);
      // Watermark
      c2.font='14px Segoe UI';c2.fillStyle='rgba(255,255,255,0.75)';
      c2.shadowColor='rgba(0,0,0,0.8)';c2.shadowBlur=6;
      c2.fillText('✦ Air Draw: by Himanshu Dubey',16,h-16);
      var a2=document.createElement('a');a2.download='airdraw-camera-'+ts+'.png';a2.href=ec2.toDataURL('image/png');a2.click();
    },300);

    saveBtn.textContent='✓ Saved 2!';
    setTimeout(function(){saveBtn.textContent='⬇ PNG';},2000);
  });

  // ── Drawing helpers ────────────────────────────────────
  function redrawStrokes(){ctx.clearRect(0,0,canvas.width,canvas.height);strokes.forEach(drawStroke);}
  function drawStroke(s){
    if(!s||s.points.length<2)return;
    var glow=(s.glow/100)*s.size*4;
    ctx.save();
    if(glow>0){
      ctx.strokeStyle=s.color;ctx.lineWidth=s.size+glow*1.2;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.globalAlpha=0.12;ctx.shadowColor=s.color;ctx.shadowBlur=glow*3;paintPath(s.points);ctx.stroke();
      ctx.lineWidth=s.size+glow*0.5;ctx.globalAlpha=0.25;ctx.shadowBlur=glow*1.5;paintPath(s.points);ctx.stroke();
    }
    ctx.strokeStyle=s.color;ctx.lineWidth=s.size;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.globalAlpha=1;ctx.shadowColor=s.color;ctx.shadowBlur=glow;paintPath(s.points);ctx.stroke();
    ctx.restore();
  }
  function paintPath(pts){
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(var i=1;i<pts.length;i++){var mx=(pts[i-1].x+pts[i].x)/2,my=(pts[i-1].y+pts[i].y)/2;ctx.quadraticCurveTo(pts[i-1].x,pts[i-1].y,mx,my);}
  }

  // ── Gesture helpers ────────────────────────────────────
  function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
  function detectGesture(lm){
    var tt=lm[4],it=lm[8],mt=lm[12],rt=lm[16],pt=lm[20];
    var im=lm[5],mm=lm[9],rm=lm[13],pm=lm[17];
    var iu=it.y<im.y-0.04,mu=mt.y<mm.y-0.04,ru=rt.y<rm.y-0.04,pu=pt.y<pm.y-0.04,pd=dist(tt,it);
    if(!iu&&!mu&&!ru&&!pu)return 'idle';
    if(pd<0.06)return 'move';
    if(iu&&!mu&&!ru&&!pu)return 'draw';
    if(iu&&mu&&ru&&pu)return 'erase';
    return 'idle';
  }
  function setGestureHUD(g){['draw','erase','move','idle'].forEach(function(id){document.getElementById('g-'+id).classList.toggle('active',id===g);});}
  function eraseAt(x,y,r){strokes=strokes.filter(function(s){return !s.points.some(function(p){return dist(p,{x:x,y:y})<r;});});redrawStrokes();}
  function cloneStrokes(src){return src.map(function(s){return {color:s.color,size:s.size,glow:s.glow,points:s.points.map(function(p){return {x:p.x,y:p.y};})};});}

  function onResults(results){
    if(!results.multiHandLandmarks||results.multiHandLandmarks.length===0){
      cursorRing.style.display='none';
      if(currentStroke&&currentStroke.points.length>1)strokes.push(currentStroke);
      currentStroke=null;prevGesture='idle';moveAnchor=null;
      setGestureHUD('idle');statusDot.className='ready';statusText.textContent='No hand';return;
    }
    statusDot.className='tracking';statusText.textContent='Tracking';
    var lm=results.multiHandLandmarks[0],g=detectGesture(lm);
    setGestureHUD(g);
    var sx=(1-lm[8].x)*canvas.width,sy=lm[8].y*canvas.height;
    cursorRing.style.display='block';cursorRing.style.left=sx+'px';cursorRing.style.top=sy+'px';
    if(g==='draw'){
      cursorRing.className='drawing';cursorRing.style.borderColor=currentColor;cursorRing.style.boxShadow='0 0 12px '+currentColor;
      if(prevGesture!=='draw')currentStroke={color:currentColor,size:brushSize,glow:glowAmount,points:[]};
      if(currentStroke){currentStroke.points.push({x:sx,y:sy});redrawStrokes();drawStroke(currentStroke);}
    } else {
      if(currentStroke&&currentStroke.points.length>1)strokes.push(currentStroke);currentStroke=null;
    }
    if(g==='erase'){cursorRing.className='erasing';eraseAt(sx,sy,brushSize*2+22);}
    if(g==='move'){
      cursorRing.className='moving';
      if(prevGesture!=='move'){moveAnchor={x:sx,y:sy};strokesSnapshot=cloneStrokes(strokes);}
      else if(moveAnchor&&strokesSnapshot){
        var dx=sx-moveAnchor.x,dy=sy-moveAnchor.y;
        strokes=strokesSnapshot.map(function(s){return {color:s.color,size:s.size,glow:s.glow,points:s.points.map(function(p){return {x:p.x+dx,y:p.y+dy};})};});
        redrawStrokes();
      }
    } else {if(prevGesture==='move'){strokesSnapshot=null;moveAnchor=null;}}
    if(g==='idle'){cursorRing.className='';cursorRing.style.borderColor='rgba(255,255,255,0.4)';cursorRing.style.boxShadow='none';}
    prevGesture=g;
  }

  // ── MediaPipe init ─────────────────────────────────────
  var hands=new Hands({locateFile:function(f){return MP_BASE+'hands/'+f;}});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.6});
  hands.onResults(onResults);

  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}})
    .then(function(stream){
      video.srcObject=stream;
      return new Promise(function(res){video.onloadedmetadata=res;});
    })
    .then(function(){
      video.play();
      loadMsg.textContent='Loading AI model… (first load ~10–20s)';
      var camera=new Camera(video,{onFrame:async function(){await hands.send({image:video});},width:1280,height:720});
      camera.start();
      setTimeout(function(){overlay.classList.add('hidden');statusDot.className='ready';statusText.textContent='Ready!';},3200);
    })
    .catch(function(err){
      var msg=err.name==='NotAllowedError'?'Camera permission denied. Allow camera & reload.':
              err.name==='NotFoundError'?'No camera found on this device.':
              err.name==='NotReadableError'?'Camera busy in another app.':'Camera error: '+err.message;
      showError(msg);
    });
}
</script>

<!-- PWA Service Worker -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
